app = "vortex-relay"
primary_region = "gru"

[build]
  dockerfile = "deploy/relay/Dockerfile"

[env]
  PORT = "7300"
  RELAY_DB = "/data/relay.db"
  RELAY_QUOTA_MB = "50"
  RELAY_ADMIN_ACCOUNT = "58c9488278d525f23835beda6fd794d9bdbfc8d5cfb612f5377635ef4112f9a2"

[mounts]
  source = "vortex_relay_data"
  destination = "/data"

[http_service]
  internal_port = 7300
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
